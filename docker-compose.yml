# Microsoft SQL Server — local development (matches DB_HOST / DB_PORT / DB_* in .env).
#
# Prerequisites:
#   - Set DB_PASSWORD in `.env` (used as SA password; must meet SQL Server complexity).
#   - Use DB_USER=sa (container default) unless you add a custom login.
#   - DB_HOST=127.0.0.1 and DB_PORT=1433 when the app runs on the host.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f db
#
# Reset data (wipes volume):  docker compose down -v && docker compose up -d
#
# First-time: create the database if it does not exist (replace password if needed):
#   docker exec -it estithmar-sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YOUR_PASSWORD" -C -Q "IF DB_ID(N'estithmar_db') IS NULL CREATE DATABASE estithmar_db;"
#
# Apple Silicon (optional): uncomment `platform: linux/amd64` under `db` if the image fails to start.

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: estithmar-sqlserver
    # platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env (SQL Server SA password)}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - estithmar_mssql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  estithmar_mssql_data:
